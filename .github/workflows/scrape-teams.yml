name: Refresh UBC design teams tracker

on:
  schedule:
    # Every Sunday at 12:00 UTC during Aug and Sep. A date-guard step
    # then restricts execution to the Aug 15 - Sep 15 recruitment window.
    - cron: '0 12 * 8,9 0'
  workflow_dispatch: {}  # allow manual runs anytime

permissions:
  contents: write

concurrency:
  group: scrape-teams
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SELENIUM_BROWSER: chrome
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check recruitment window (Aug 15 - Sep 15)
        id: window
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "in_window=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch, skipping date guard."
            exit 0
          fi
          DATE=$(date -u +%m%d)
          if [ "$DATE" -ge "0815" ] && [ "$DATE" -le "0915" ]; then
            echo "in_window=true"  >> "$GITHUB_OUTPUT"
            echo "In recruitment window ($DATE)."
          else
            echo "in_window=false" >> "$GITHUB_OUTPUT"
            echo "Outside window ($DATE), exiting early."
          fi

      - name: Checkout repo
        if: steps.window.outputs.in_window == 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.window.outputs.in_window == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python deps
        if: steps.window.outputs.in_window == 'true'
        working-directory: scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Install Chrome
        if: steps.window.outputs.in_window == 'true'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run pipeline (stage1..stage5)
        if: steps.window.outputs.in_window == 'true'
        working-directory: scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set; cannot run stage5." && exit 1
          fi
          python main.py all --mode selenium

      - name: Commit updated teams.json
        if: steps.window.outputs.in_window == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/teams.json; then
            echo "No changes to data/teams.json."
            exit 0
          fi
          git add data/teams.json
          git commit -m "chore(teams): weekly refresh $(date -u +%Y-%m-%d)"
          git push
